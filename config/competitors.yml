  enterprise:
    name: Enterprise
    description: Large-scale enterprise solutions
  multi_channel:
    name: Multi-Channel
    description: Tools for diverse channel mixes
  lead_gen:
    name: Lead Generation
    description: Tools for lead-based businesses
  unified:
    name: Unified Measurement
    description: Complete measurement stacks
  free:
    name: Free Tools
    description: Free or freemium options

# mbuzz data for comparison
mbuzz:
  name: mbuzz
  slug: mbuzz
  website: https://mbuzz.co
  logo: /images/mbuzz-logo.svg
  category: unified
  categories: [dtc, b2b, multi_channel, lead_gen, unified]
  tagline: "Server-side attribution with model flexibility"

  pricing:
    starting: 0
    currency: USD
    period: month
    has_free_tier: true
    pricing_model: flat
    tiers:
      - name: Free
        price: 0
        records: <%= Billing::FREE_EVENT_LIMIT %>
      - name: Starter
        price: 29
        records: <%= Billing::STARTER_EVENT_LIMIT %>
      - name: Growth
        price: 99
        records: <%= Billing::GROWTH_EVENT_LIMIT %>
      - name: Pro
        price: 299
        records: <%= Billing::PRO_EVENT_LIMIT %>

  features:
    tracking_method: server_side
    platforms: [shopify, rails, django, laravel, node, any]
    attribution_models: 8
    custom_models: true
    view_through: true
    ltv_tracking: true
    server_side: true
    setup_time: "10 minutes"
    model_names:
      - First Touch
      - Last Touch
      - Linear
      - Time Decay
      - U-Shaped
      - W-Shaped
      - Markov Chain
      - Shapley Value

  differentiators:
    - "Server-side tracking (95%+ event capture)"
    - "8 attribution models side-by-side"
    - "Custom rule editor"
    - "LTV attribution built-in"
    - "Transparent, flat pricing"
    - "No vendor lock-in"
