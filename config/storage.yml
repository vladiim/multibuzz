test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage", Process.pid.to_s) %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

digitalocean:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:do_spaces, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:do_spaces, :secret_access_key) %>
  region: <%= Rails.application.credentials.dig(:do_spaces, :region) %>
  bucket: <%= Rails.application.credentials.dig(:do_spaces, :bucket) %>
  endpoint: https://<%= Rails.application.credentials.dig(:do_spaces, :region) %>.digitaloceanspaces.com
  force_path_style: false
  public: false
