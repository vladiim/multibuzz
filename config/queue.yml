default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # The default worker never touches the reattribution queue, so heavy
    # reattribution can never starve latency-sensitive jobs. Add any new
    # queue to both worker lists explicitly.
    - queues: [ default, low, solid_queue_recurring ]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    # The reattribution worker prioritises reattribution but also polls the
    # other queues at lower priority, so a jam on the default worker cannot
    # silence the QueueDepthAlert watchdog.
    # See lib/docs/architecture/reattribution_pipeline.md.
    - queues: [ reattribution, default, low, solid_queue_recurring ]
      threads: 2
      processes: 1
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
