rest_api:
  key: rest_api
  name: REST API
  display_name: REST API (Any Language)
  icon: api
  package_name: null
  package_manager: null
  package_url: null
  github_url: null
  docs_url: /docs/api-reference
  status: live
  released_at: '2025-10-01'
  category: api
  sort_order: 10
  install_command: null
  init_code: |
    # Set your API key as an environment variable
    export MBUZZ_API_KEY=sk_live_your_key_here
  event_code: |
    curl -X POST https://mbuzz.co/api/v1/events \
      -H "Authorization: Bearer $MBUZZ_API_KEY" \
      -H "Content-Type: application/json" \
      -d '{"events": [{"event_type": "page_view", "visitor_id": "abc123", "session_id": "xyz789", "properties": {"url": "https://example.com"}}]}'
  conversion_code: |
    curl -X POST https://mbuzz.co/api/v1/conversions \
      -H "Authorization: Bearer $MBUZZ_API_KEY" \
      -H "Content-Type: application/json" \
      -d '{"conversion": {"conversion_type": "purchase", "visitor_id": "abc123", "revenue": 99.99}}'
  identify_code: |
    curl -X POST https://mbuzz.co/api/v1/identify \
      -H "Authorization: Bearer $MBUZZ_API_KEY" \
      -H "Content-Type: application/json" \
      -d '{"user_id": "user_123", "visitor_id": "abc123", "traits": {"email": "user@example.com"}}'
  middleware_code: null
  verification_command: null
