#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  queue_cleanup:
    class: Infrastructure::QueueCleanupJob
    schedule: at 2am every day

  data_integrity_surveillance:
    class: DataIntegrity::SurveillanceSchedulerJob
    schedule: every hour

  data_integrity_cleanup:
    class: DataIntegrity::CleanupJob
    schedule: at 3am every day

  log_archive:
    class: Logs::ArchiveJob
    schedule: at 4am every day

  infrastructure_health_check:
    class: Infrastructure::HealthCheckJob
    schedule: at 5am every day

  ad_spend_sync:
    class: AdPlatforms::SpendSyncSchedulerJob
    schedule: at 6am every day
