pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion {staged_files}
    erblint:
      glob: "*.html.erb"
      exclude: "app/content/articles/{models,forecasting,fundamentals,implementation,advanced}/**"
      run: bundle exec erb_lint {staged_files}

pre-push:
  commands:
    brakeman:
      run: bin/brakeman --no-pager --quiet --no-exit-on-error --no-exit-on-warn
    bundler-audit:
      run: bundle exec bundler-audit check --update
